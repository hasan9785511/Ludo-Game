<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Shooter HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
body {
  margin:0; background:#003366; touch-action:none; user-select:none;
  font-family: 'Fredoka One', cursive;
}
#game-wrapper {
  position:relative;
  max-width:500px;
  aspect-ratio:9/16;
  margin:40px auto;
  background:#aae0ff;
  box-shadow:0 0 50px rgba(0,0,0,0.5);
  border-radius:10px;
  overflow:hidden;
}
canvas { width:100%; height:100%; display:block; }
#ui-layer {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none;
}
#score-display {
  position:absolute; top:15px; left:50%; transform:translateX(-50%);
  padding:5px 20px; border-radius:20px; border:2px solid rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.3); color:white; backdrop-filter:blur(5px);
  text-align:center; font-size:clamp(18px,4vw,24px); text-shadow:0 2px 4px rgba(0,0,0,0.3);
}
#start-menu,#gameover-menu{
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(13,71,161,0.6); backdrop-filter:blur(12px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:white; text-align:center; z-index:10;
}
#start-menu h1,#gameover-menu h1{
  font-size:clamp(30px,8vw,50px); letter-spacing:2px; text-shadow:0 6px 0 rgba(0,0,0,0.2); margin-bottom:20px;
}
#gameover-menu h1 { color:#ff4444; text-shadow:none; }
.btn{
  font-family:'Fredoka One'; font-size:clamp(18px,5vw,28px);
  padding:12px 40px; border-radius:50px; border:4px solid white;
  background:linear-gradient(to bottom,#FFDD00,#FFAA00);
  color:white; text-transform:uppercase; margin-top:15px;
  box-shadow:0 8px 0px #b37700; cursor:pointer; pointer-events:auto;
  transition:transform 0.1s;
}
.btn:active{
  transform:translateY(4px); box-shadow:0 4px 0px #b37700;
}
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game-canvas"></canvas>
  <div id="ui-layer">
    <div id="score-display">SCORE: 0</div>
    <div id="start-menu"><h1>POP ALL THE<br>BUBBLES</h1><button class="btn" onclick="startGame()">PLAY</button></div>
    <div id="gameover-menu" style="display:none"><h1>GAME OVER</h1><div id="final-score" style="font-size:32px;margin:10px 0;">SCORE: 0</div><button class="btn" onclick="startGame()">TRY AGAIN</button></div>
  </div>
</div>

<script>
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const COLS=11,ROWS=16;
let BUBBLE_R,ROW_HEIGHT,grid=[],COLORS=['#00D000','#0044EE','#E52B22','#9900DD','#FFDD00'],STONE_COLOR='#A0A0B0';
let shooter={x:0,y:0,r:0,angle:0,ready:true,color:0,nextColor:0};
let movingBubble=null,score=0,shotsFired=0,gameOver=false;

function resizeCanvas(){
  const rect=document.getElementById('game-wrapper').getBoundingClientRect();
  canvas.width=rect.width; canvas.height=rect.height;
  BUBBLE_R=canvas.width/(COLS*2);
  ROW_HEIGHT=BUBBLE_R*Math.sqrt(3);
  shooter.x=canvas.width/2; shooter.y=canvas.height-BUBBLE_R*3.5; shooter.r=BUBBLE_R;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    const row=[];
    const cols=(r%2===0)?COLS:COLS-1;
    for(let c=0;c<cols;c++){
      if(r<8){
        let stone=(r>4 && Math.random()<0.1)?5:Math.floor(Math.random()*5);
        row.push(stone);
      }else row.push(null);
    }
    grid.push(row);
  }
}

function drawBeautifulBubble(x,y,r,colorIdx){
  ctx.save();
  ctx.beginPath();
  ctx.arc(x,y,r*0.95,0,Math.PI*2);
  ctx.fillStyle=(colorIdx===5)?STONE_COLOR:COLORS[colorIdx];
  ctx.fill();
  const grad=ctx.createRadialGradient(x-r*0.2,y-r*0.2,0,x,y,r);
  grad.addColorStop(0,'rgba(255,255,255,0.4)');
  grad.addColorStop(0.6,'rgba(255,255,255,0.1)');
  grad.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=grad; ctx.fill();
  // highlight
  ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.3,r*0.2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill();
  ctx.restore();
}

function gridToPixel(r,c){
  const x=(r%2===0)?c*BUBBLE_R*2+BUBBLE_R:c*BUBBLE_R*2+BUBBLE_R*2;
  const y=r*ROW_HEIGHT+BUBBLE_R;
  return {x,y};
}

function drawGrid(){
  for(let r=0;r<ROWS;r++){
    const cols=(r%2===0)?COLS:COLS-1;
    for(let c=0;c<cols;c++){
      if(grid[r][c]!=null){
        const {x,y}=gridToPixel(r,c);
        drawBeautifulBubble(x,y,BUBBLE_R,grid[r][c]);
      }
    }
  }
}

function drawBackground(){
  const grad=ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#00b4db'); grad.addColorStop(1,'#ffffff');
  ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.moveTo(0,canvas.height-50);
  ctx.quadraticCurveTo(canvas.width/2,canvas.height-80,canvas.width,canvas.height-50);
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=6;
  ctx.stroke();
}

function drawLauncher(){
  ctx.save();
  ctx.translate(shooter.x,shooter.y);
  ctx.rotate(shooter.angle+Math.PI/2);
  ctx.beginPath();
  ctx.roundRect(-BUBBLE_R*1.2,-BUBBLE_R*3,BUBBLE_R*2.4,BUBBLE_R*3,6);
  const grad=ctx.createLinearGradient(-BUBBLE_R*1.2,0,BUBBLE_R*1.2,0);
  grad.addColorStop(0,'#555'); grad.addColorStop(0.5,'#888'); grad.addColorStop(1,'#555');
  ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
  ctx.beginPath();
  ctx.arc(shooter.x,shooter.y+BUBBLE_R*1.5,BUBBLE_R*2,Math.PI,0);
  ctx.fillStyle='#444'; ctx.fill(); ctx.strokeStyle='#222'; ctx.stroke();
  drawBeautifulBubble(BUBBLE_R*2,canvas.height-BUBBLE_R*2,BUBBLE_R*0.7,shooter.nextColor);
}

function update(){
  if(movingBubble){
    movingBubble.x+=movingBubble.vx; movingBubble.y+=movingBubble.vy;
    if(movingBubble.x<=movingBubble.r || movingBubble.x>=canvas.width-movingBubble.r) movingBubble.vx*=-1;
    if(movingBubble.y<=BUBBLE_R){
      placeBubble(movingBubble);
    } else {
      for(let r=0;r<ROWS;r++){
        const cols=(r%2===0)?COLS:COLS-1;
        for(let c=0;c<cols;c++){
          if(grid[r][c]!=null){
            const {x,y}=gridToPixel(r,c);
            const dx=x-movingBubble.x,dy=y-movingBubble.y;
            if(Math.sqrt(dx*dx+dy*dy)<=BUBBLE_R*2){
              placeBubble(movingBubble);
              return;
            }
          }
        }
      }
    }
  }
}

function placeBubble(b){
  const rIdx=Math.floor(b.y/ROW_HEIGHT);
  const cIdx=Math.floor((rIdx%2===0)?(b.x/BUBBLE_R/2):((b.x-BUBBLE_R)/BUBBLE_R/2));
  if(rIdx>=ROWS-3) gameOver=true;
  if(rIdx>=ROWS) {gameOver=true; rIdx=ROWS-1;}
  if(!grid[rIdx]) grid[rIdx]=[];
  grid[rIdx][cIdx]=b.color;
  movingBubble=null; shooter.ready=true; score+=10; shotsFired++;
  shooter.color=shooter.nextColor; shooter.nextColor=Math.floor(Math.random()*5);
  document.getElementById('score-display').textContent='SCORE: '+score;
  if(gameOver){document.getElementById('gameover-menu').style.display='flex';document.getElementById('final-score').textContent='SCORE: '+score;}
}

function draw(){
  drawBackground();
  drawGrid();
  drawLauncher();
  if(movingBubble){
    drawBeautifulBubble(movingBubble.x,movingBubble.y,BUBBLE_R,movingBubble.color);
  }
  update();
  if(!gameOver) requestAnimationFrame(draw);
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const dx=e.clientX-rect.left-shooter.x;
  const dy=e.clientY-rect.top-shooter.y;
  let angle=Math.atan2(dy,dx);
  shooter.angle=Math.min(Math.max(angle,-Math.PI+0.2),-0.2);
});
canvas.addEventListener('click',()=>{
  if(shooter.ready){
    movingBubble={x:shooter.x,y:shooter.y,r:BUBBLE_R,color:shooter.color,vx:Math.cos(shooter.angle)*canvas.height*0.03,vy:Math.sin(shooter.angle)*canvas.height*0.03};
    shooter.ready=false;
  }
});
function startGame(){
  score=0; shotsFired=0; gameOver=false;
  document.getElementById('start-menu').style.display='none';
  document.getElementById('gameover-menu').style.display='none';
  shooter.color=Math.floor(Math.random()*5); shooter.nextColor=Math.floor(Math.random()*5); shooter.ready=true;
  initGrid(); draw();
}
startGame();
</script>
</body>
</html>
