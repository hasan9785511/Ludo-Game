<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700;800&display=swap');

        :root {
            --bg-dark: #0f172a;
            --wood-frame: #5c3a21;
            --wood-light: #8a5a3a;
            --board-surface: #f3e5ab;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        /* Top UI Bar */
        .ui-top {
            position: absolute;
            top: 10px;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            pointer-events: none;
        }

        .player-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 25px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .player-badge.active {
            border-color: #ffd700;
            background: rgba(50, 50, 50, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
        }

        .score-box {
            display: flex;
            flex-direction: column;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #ccc;
            letter-spacing: 1px;
        }

        .score-val {
            font-size: 22px;
            font-weight: 800;
            color: #ffd700;
            line-height: 1;
        }

        /* Game Board */
        #game-container {
            border: 25px solid var(--wood-frame);
            border-radius: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 
                        0 20px 60px rgba(0,0,0,0.6), 
                        0 0 0 5px #3a2515;
            width: 95vw;
            height: 95vw;
            max-width: 600px;
            max-height: 600px;
            background-color: var(--board-surface);
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Menu Overlay */
        #menu-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .menu-card h1 {
            font-size: 36px;
            color: var(--wood-frame);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .how-to-play {
            font-size: 13px;
            color: #666;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(to bottom, #ff9933, #e68a00);
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px #b36b00;
            cursor: pointer;
            transition: all 0.1s;
            width: 100%;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px #b36b00;
        }

        /* In-Game Message */
        #game-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
            white-space: nowrap;
            border: 2px solid #ffd700;
        }

        /* Controls Hint */
        .controls-hint {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.7;
            color: white;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="ui-top">
        <div class="player-badge active" id="badge-cpu">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar" alt="CPU">
            <div class="score-box">
                <span class="score-label">CPU (Black)</span>
                <span class="score-val" id="score-cpu">0</span>
            </div>
        </div>
        <div class="player-badge" id="badge-player">
            <div class="score-box" style="text-align: right;">
                <span class="score-label">Player (White)</span>
                <span class="score-val" id="score-player">0</span>
            </div>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar" alt="Player">
        </div>
    </div>

    <div id="game-container">
        <canvas id="board"></canvas>
        <div id="game-message">FOUL!</div>
    </div>

    <div class="controls-hint">Drag striker &bull; Pull back to shoot</div>

    <div id="menu-overlay">
        <div class="menu-card">
            <h1 id="menu-title">Carrom 3D</h1>
            <div class="how-to-play">
                👆 <b>Drag</b> striker left/right to aim.<br>
                🏹 <b>Pull Back</b> (downwards) to power.<br>
                ✨ <b>Release</b> to shoot!
            </div>
            <button class="btn" onclick="startGame()">PLAY</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Physics & Game Constants
    const FRICTION = 0.985;
    const WALL_DAMPING = 0.6;
    const SUB_STEPS = 4;
    const BASE_SIZE = 600;
    let SCALE = 1;
    let STRIKER_RADIUS = 20;
    let PIECE_RADIUS = 14;
    let POCKET_RADIUS = 30;
    const MAX_POWER = 45;

    // Game State
    let state = 'MENU'; // MENU, AIMING, MOVING, END
    let turn = 'player';
    let scores = { player: 0, cpu: 0 };
    let pieces = [];
    let striker = null;
    let turnData = { foul: false, validPocket: false };

    // Input State
    let drag = { active: false, mode: 'none', startX: 0, startY: 0, curX: 0, curY: 0 };

    class Piece {
        constructor(x, y, radius, mass, color, type) {
            this.x = x; this.y = y;
            this.vx = 0; this.vy = 0;
            this.radius = radius;
            this.mass = mass;
            this.color = color;
            this.type = type; // 'striker', 'white', 'black', 'queen'
        }
    }

    function resize() {
        const container = document.getElementById('game-container');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        SCALE = canvas.width / BASE_SIZE;
        STRIKER_RADIUS = 20 * SCALE;
        PIECE_RADIUS = 14 * SCALE;
        POCKET_RADIUS = 30 * SCALE;
    }
    window.addEventListener('resize', () => { if(state !== 'MENU') resize(); });

    function startGame() {
        document.getElementById('menu-overlay').style.display = 'none';
        scores = { player: 0, cpu: 0 };
        updateScoreUI();
        resize();
        initBoard();
        state = 'AIMING';
        turn = 'player';
        updateTurnUI();
        resetStriker();
        requestAnimationFrame(gameLoop);
    }

    function initBoard() {
        pieces = [];
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        
        // Queen
        pieces.push(new Piece(cx, cy, PIECE_RADIUS, 1, '#ff6666', 'queen'));

        // Inner Ring (6 pieces)
        const r1 = PIECE_RADIUS * 2.05;
        for (let i = 0; i < 6; i++) {
            let angle = i * Math.PI / 3;
            let type = i % 2 === 0 ? 'black' : 'white';
            let color = type === 'black' ? '#4a4a4a' : '#ffffff';
            pieces.push(new Piece(cx + Math.cos(angle)*r1, cy + Math.sin(angle)*r1, PIECE_RADIUS, 1, color, type));
        }

        // Outer Ring (12 pieces)
        const r2 = r1 * 1.95;
        for (let i = 0; i < 12; i++) {
            let angle = (i * Math.PI / 6) + (Math.PI / 12);
            let type = i % 2 === 0 ? 'white' : 'black';
            let color = type === 'black' ? '#4a4a4a' : '#ffffff';
            pieces.push(new Piece(cx + Math.cos(angle)*r2, cy + Math.sin(angle)*r2, PIECE_RADIUS, 1, color, type));
        }

        striker = new Piece(0, 0, STRIKER_RADIUS, 4, '#fffbe0', 'striker');
        pieces.push(striker);
    }

    function resetStriker() {
        striker.vx = 0; striker.vy = 0;
        const margin = 70 * SCALE;
        striker.x = canvas.width / 2;
        striker.y = turn === 'player' ? canvas.height - 90 * SCALE : 90 * SCALE;
        
        if (turn === 'cpu') {
            setTimeout(cpuTurn, 1000);
        }
    }

    function showMessage(text, color) {
        const msg = document.getElementById('game-message');
        msg.textContent = text;
        msg.style.borderColor = color;
        msg.style.color = color === '#ccc' ? '#fff' : color;
        msg.style.opacity = 1;
        setTimeout(() => msg.style.opacity = 0, 1500);
    }

    function updateScoreUI() {
        document.getElementById('score-player').textContent = scores.player;
        document.getElementById('score-cpu').textContent = scores.cpu;
    }

    function updateTurnUI() {
        document.getElementById('badge-player').className = 'player-badge ' + (turn === 'player' ? 'active' : '');
        document.getElementById('badge-cpu').className = 'player-badge ' + (turn === 'cpu' ? 'active' : '');
    }

    // Controls Handling
    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function pointerDown(e) {
        if (state !== 'AIMING' || turn !== 'player') return;
        const pos = getPointerPos(e);
        const dist = Math.hypot(pos.x - striker.x, pos.y - striker.y);
        
        if (dist < STRIKER_RADIUS * 2.5) {
            drag.active = true;
            drag.mode = 'slide';
            drag.startX = pos.x; drag.startY = pos.y;
            drag.curX = pos.x; drag.curY = pos.y;
        }
    }

    function pointerMove(e) {
        if (!drag.active) return;
        e.preventDefault();
        const pos = getPointerPos(e);
        drag.curX = pos.x; drag.curY = pos.y;
        
        if (drag.mode === 'slide') {
            const dy = drag.curY - drag.startY;
            if (dy >= 40 * SCALE) {
                drag.mode = 'aim';
                drag.startX = drag.curX; 
                drag.startY = drag.curY;
            } else {
                const margin = 60 * SCALE + striker.radius;
                striker.x = Math.max(margin, Math.min(canvas.width - margin, pos.x));
            }
        }
    }

    function pointerUp(e) {
        if (!drag.active) return;
        drag.active = false;
        
        if (drag.mode === 'aim') {
            const dx = drag.startX - drag.curX;
            const dy = drag.startY - drag.curY;
            const dist = Math.hypot(dx, dy);
            
            if (dist > 5) {
                const angle = Math.atan2(dy, dx);
                const power = Math.min(dist * 0.15, MAX_POWER * SCALE);
                striker.vx = Math.cos(angle) * power;
                striker.vy = Math.sin(angle) * power;
                startMovement();
            }
        }
        drag.mode = 'none';
    }

    canvas.addEventListener('mousedown', pointerDown);
    window.addEventListener('mousemove', pointerMove);
    window.addEventListener('mouseup', pointerUp);
    canvas.addEventListener('touchstart', pointerDown, {passive: false});
    window.addEventListener('touchmove', pointerMove, {passive: false});
    window.addEventListener('touchend', pointerUp);

    function cpuTurn() {
        if (state !== 'AIMING' || turn !== 'cpu') return;
        
        const targets = pieces.filter(p => p.type === 'black' || p.type === 'queen');
        if(targets.length === 0) return; // Failsafe
        
        const target = targets[Math.floor(Math.random() * targets.length)];
        
        // Position Striker
        const margin = 70 * SCALE;
        const noise = (Math.random() - 0.5) * 40 * SCALE; // +-20 noise
        striker.x = Math.max(margin, Math.min(canvas.width - margin, target.x + noise));
        
        // Aim & Power
        const dx = target.x - striker.x;
        const dy = target.y - striker.y;
        const dist = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx);
        
        const power = Math.min((dist * 0.08) + 15, MAX_POWER) * SCALE;
        
        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;
        
        startMovement();
    }

    function startMovement() {
        state = 'MOVING';
        turnData = { foul: false, validPocket: false };
    }

    // Physics Engine
    function updatePhysics() {
        let totalKE = 0;
        const margin = 20 * SCALE;

        for (let step = 0; step < SUB_STEPS; step++) {
            // Move & Wall Collisions
            for (let p of pieces) {
                p.x += p.vx / SUB_STEPS;
                p.y += p.vy / SUB_STEPS;

                if (p.x < margin + p.radius) { p.x = margin + p.radius; p.vx *= -WALL_DAMPING; }
                if (p.x > canvas.width - margin - p.radius) { p.x = canvas.width - margin - p.radius; p.vx *= -WALL_DAMPING; }
                if (p.y < margin + p.radius) { p.y = margin + p.radius; p.vy *= -WALL_DAMPING; }
                if (p.y > canvas.height - margin - p.radius) { p.y = canvas.height - margin - p.radius; p.vy *= -WALL_DAMPING; }
            }

            // Piece Collisions
            for (let i = 0; i < pieces.length; i++) {
                for (let j = i + 1; j < pieces.length; j++) {
                    let p1 = pieces[i], p2 = pieces[j];
                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let dist = Math.hypot(dx, dy);
                    let minDist = p1.radius + p2.radius;

                    if (dist < minDist && dist > 0) {
                        // Separate
                        let overlap = minDist - dist;
                        let nx = dx / dist, ny = dy / dist;
                        let mRatio1 = p2.mass / (p1.mass + p2.mass);
                        let mRatio2 = p1.mass / (p1.mass + p2.mass);

                        p1.x -= nx * overlap * mRatio1; p1.y -= ny * overlap * mRatio1;
                        p2.x += nx * overlap * mRatio2; p2.y += ny * overlap * mRatio2;

                        // Velocity Resolution
                        let dvx = p2.vx - p1.vx;
                        let dvy = p2.vy - p1.vy;
                        let velAlongNormal = dvx * nx + dvy * ny;

                        if (velAlongNormal < 0) {
                            let restitution = 0.8;
                            let jImpulse = -(1 + restitution) * velAlongNormal / (1/p1.mass + 1/p2.mass);
                            
                            let impulseX = nx * jImpulse;
                            let impulseY = ny * jImpulse;

                            p1.vx -= impulseX / p1.mass; p1.vy -= impulseY / p1.mass;
                            p2.vx += impulseX / p2.mass; p2.vy += impulseY / p2.mass;
                        }
                    }
                }
            }
        }

        // Post-step: Friction, Pockets, Snapping
        const corners = [
            {x: 25*SCALE, y: 25*SCALE}, {x: canvas.width - 25*SCALE, y: 25*SCALE},
            {x: 25*SCALE, y: canvas.height - 25*SCALE}, {x: canvas.width - 25*SCALE, y: canvas.height - 25*SCALE}
        ];

        for (let i = pieces.length - 1; i >= 0; i--) {
            let p = pieces[i];
            p.vx *= FRICTION; p.vy *= FRICTION;
            
            if (Math.abs(p.vx) < 0.05) p.vx = 0;
            if (Math.abs(p.vy) < 0.05) p.vy = 0;

            totalKE += 0.5 * p.mass * (p.vx*p.vx + p.vy*p.vy);

            // Pocket Check
            for (let c of corners) {
                if (Math.hypot(p.x - c.x, p.y - c.y) < POCKET_RADIUS) {
                    handlePocketed(p);
                    pieces.splice(i, 1);
                    break;
                }
            }
        }

        if (state === 'MOVING' && totalKE === 0) {
            handleTurnEnd();
        }
    }

    function handlePocketed(p) {
        if (p.type === 'striker') {
            turnData.foul = true;
            showMessage("FOUL!", "#ff4444");
        } else if (p.type === 'queen') {
            scores[turn] += 50;
            turnData.validPocket = true;
            showMessage("QUEEN!", "#d93025");
        } else if (p.type === 'white') {
            scores.player += 10;
            if (turn === 'player') { turnData.validPocket = true; showMessage("Nice!", "#ffd700"); }
        } else if (p.type === 'black') {
            scores.cpu += 10;
            if (turn === 'cpu') { turnData.validPocket = true; showMessage("CPU Score", "#ccc"); }
        }
        updateScoreUI();
    }

    function handleTurnEnd() {
        let wCount = 0, bCount = 0, qPresent = false;
        pieces.forEach(p => {
            if (p.type === 'white') wCount++;
            if (p.type === 'black') bCount++;
            if (p.type === 'queen') qPresent = true;
        });

        if (!qPresent) {
            if (wCount === 0) return endGame("Player Wins!");
            if (bCount === 0) return endGame("CPU Wins!");
        }

        // Switch turn if no valid pocket or foul occurred
        if (!turnData.validPocket || turnData.foul) {
            turn = turn === 'player' ? 'cpu' : 'player';
        }
        
        updateTurnUI();
        state = 'AIMING';
        
        // Restore Striker if pocketed
        if (!pieces.includes(striker)) pieces.push(striker);
        resetStriker();
    }

    function endGame(title) {
        state = 'END';
        document.getElementById('menu-title').textContent = title;
        document.getElementById('menu-overlay').style.display = 'flex';
    }

    // Drawing Engine
    function draw() {
        ctx.fillStyle = 'var(--board-surface)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const w = canvas.width, h = canvas.height;
        const cx = w/2, cy = h/2;

        // Draw Center Pattern
        ctx.beginPath();
        ctx.arc(cx, cy, 75*SCALE, 0, Math.PI*2);
        ctx.lineWidth = 2; ctx.strokeStyle = '#5c3a21'; ctx.stroke();

        ctx.strokeStyle = '#d93025';
        for(let i=0; i<8; i++) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(i * Math.PI/4);
            ctx.beginPath();
            ctx.moveTo(0, 20*SCALE);
            ctx.quadraticCurveTo(20*SCALE, 45*SCALE, 0, 75*SCALE);
            ctx.stroke();
            ctx.restore();
        }

        // Draw Lines
        const sm = 60 * SCALE; // Side Margin
        ctx.lineWidth = 2; ctx.strokeStyle = '#1a1a1a';
        
        // Baselines & Inner parallels
        const drawBaseline = (y, dir) => {
            ctx.beginPath(); ctx.moveTo(sm, y); ctx.lineTo(w - sm, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sm, y + dir*25*SCALE); ctx.lineTo(w - sm, y + dir*25*SCALE); ctx.stroke();
            ctx.fillStyle = '#ff4444';
            ctx.beginPath(); ctx.arc(sm, y, 10*SCALE, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(w - sm, y, 10*SCALE, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        };
        drawBaseline(90*SCALE, 1);       // CPU (Top)
        drawBaseline(h - 90*SCALE, -1);  // Player (Bottom)

        // Vertical Lines
        ctx.beginPath(); ctx.moveTo(sm, sm); ctx.lineTo(sm, h - sm); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w - sm, sm); ctx.lineTo(w - sm, h - sm); ctx.stroke();

        // Diagonal Arrows
        ctx.lineWidth = 3;
        const drawArrow = (x1, y1, x2, y2) => {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            // Arrowhead math simplified
            let ang = Math.atan2(y2-y1, x2-x1);
            ctx.beginPath(); ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - 15*SCALE*Math.cos(ang-0.5), y2 - 15*SCALE*Math.sin(ang-0.5));
            ctx.lineTo(x2 - 15*SCALE*Math.cos(ang+0.5), y2 - 15*SCALE*Math.sin(ang+0.5));
            ctx.fillStyle = '#1a1a1a'; ctx.fill();
        }
        drawArrow(140*SCALE, 140*SCALE, 60*SCALE, 60*SCALE);
        drawArrow(w - 140*SCALE, 140*SCALE, w - 60*SCALE, 60*SCALE);
        drawArrow(140*SCALE, h - 140*SCALE, 60*SCALE, h - 60*SCALE);
        drawArrow(w - 140*SCALE, h - 140*SCALE, w - 60*SCALE, h - 60*SCALE);

        // Pockets
        const corners = [{x: 25*SCALE, y: 25*SCALE}, {x: w - 25*SCALE, y: 25*SCALE}, {x: 25*SCALE, y: h - 25*SCALE}, {x: w - 25*SCALE, y: h - 25*SCALE}];
        corners.forEach(c => {
            ctx.beginPath(); ctx.arc(c.x, c.y, POCKET_RADIUS, 0, Math.PI*2);
            ctx.fillStyle = '#1a1a1a'; ctx.fill();
            ctx.lineWidth = 4; ctx.strokeStyle = '#5c3a21'; ctx.stroke();
        });

        // Aiming Guides
        if (state === 'AIMING') {
            ctx.beginPath();
            ctx.arc(striker.x, striker.y, striker.radius + 6, 0, Math.PI*2);
            ctx.strokeStyle = turn === 'player' ? '#39ff14' : '#ff4444';
            ctx.lineWidth = 2; ctx.stroke();

            if (drag.active && drag.mode === 'aim' && turn === 'player') {
                const dx = drag.startX - drag.curX;
                const dy = drag.startY - drag.curY;
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(striker.x + dx * 2.5, striker.y + dy * 2.5);
                ctx.strokeStyle = '#39ff14';
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 10]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Draw Pieces
        pieces.forEach(p => {
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            
            let grad = ctx.createRadialGradient(p.x - p.radius/3, p.y - p.radius/3, p.radius/4, p.x, p.y, p.radius);
            if(p.type === 'striker') { grad.addColorStop(0, '#fffbe0'); grad.addColorStop(1, '#e6c300'); }
            else if(p.type === 'white') { grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#dcdcdc'); }
            else if(p.type === 'black') { grad.addColorStop(0, '#4a4a4a'); grad.addColorStop(1, '#1a1a1a'); }
            else if(p.type === 'queen') { grad.addColorStop(0, '#ff6666'); grad.addColorStop(1, '#cc0000'); }
            
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        });
    }

    function gameLoop() {
        if (state === 'MOVING') updatePhysics();
        draw();
        if (state !== 'END') requestAnimationFrame(gameLoop);
    }

    // Initial render for visual effect behind menu
    resize();
    initBoard();
    draw();

</script>
</body>
</html>
